search_type: grid
num_trials: null

base_config: ./configs/baseline.yaml

grid:
  model.activation: [relu]
  model.hidden_dim: [128]
  train.learning_rate: [0.1, 0.05, 0.01]
  train.weight_decay: [0.0005]

notes:
  - 第一阶段只比较学习率，固定 ReLU、hidden_dim=128 和 wd=5e-4。
  - 目标是先确定稳定且效果好的学习率，再继续做激活函数或隐藏层规模对比。
