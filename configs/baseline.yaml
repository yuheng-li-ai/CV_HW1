seed: 42
dataset:
  name: fashion_mnist
  data_dir: ./artifacts/data
  val_ratio: 0.1
  normalize: true

model:
  input_dim: 784
  hidden_dim: 128
  output_dim: 10
  activation: relu

train:
  epochs: 20
  batch_size: 128
  learning_rate: 0.05
  weight_decay: 0.0005
  lr_decay:
    name: step
    step_size: 5
    gamma: 0.5

checkpoint:
  save_dir: ./artifacts/checkpoints/baseline
  monitor: val_accuracy

logging:
  run_name: baseline
  output_dir: ./artifacts/runs

visualization:
  tsne_sample_size: 2000
  max_error_cases: 16
  max_weight_maps: 64
