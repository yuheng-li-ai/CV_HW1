search_type: grid
num_trials: null

base_config: ./configs/baseline.yaml

grid:
  model.activation: [relu, leaky_relu, elu, sigmoid, tanh, softplus, swish]
  model.hidden_dim: [128]
  train.learning_rate: [0.3]
  train.weight_decay: [0.0005]

notes:
  - Activation comparison under the stronger learning-rate setting found from the ReLU study.
  - Hidden dimension and weight decay are fixed to isolate the effect of nonlinearities.
