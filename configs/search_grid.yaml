search_type: grid
num_trials: null

base_config: ./configs/baseline.yaml

grid:
  model.hidden_dim: [64, 128, 256, 512]
  model.activation: [relu, leaky_relu, elu, tanh, sigmoid, softplus, swish]
  train.learning_rate: [0.1, 0.05, 0.01]
  train.weight_decay: [0.0, 0.0001, 0.0005, 0.001]

notes:
  - 优先跑基础组合，确认训练稳定后再扩大搜索规模。
  - 若总实验量过大，可先固定部分参数分阶段搜索。
